# ============================================
# Prometheus 监控配置
# 电商自动化系统
# ============================================

global:
  scrape_interval: 15s      # 默认抓取间隔
  evaluation_interval: 15s  # 规则评估间隔
  external_labels:
    cluster: 'ecommerce'
    replica: '{{.ExternalURL}}'

# 告警规则文件
rule_files:
  - '/etc/prometheus/rules/*.yml'

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# 抓取目标配置
scrape_configs:
  # ============================================
  # Prometheus 自身监控
  # ============================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # ============================================
  # 电商应用监控
  # ============================================
  - job_name: 'ecommerce-app'
    static_configs:
      - targets: ['app:8000']
        labels:
          service: 'ecommerce-app'
          environment: 'production'
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s

  # ============================================
  # Node Exporter - 主机指标
  # ============================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    metrics_path: /metrics

  # ============================================
  # Redis Exporter - Redis 监控
  # ============================================
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
    metrics_path: /metrics

  # ============================================
  # MySQL Exporter - MySQL 监控
  # ============================================
  - job_name: 'mysql-exporter'
    static_configs:
      - targets: ['mysql-exporter:9104']
    metrics_path: /metrics

  # ============================================
  # Cadvisor - 容器监控
  # ============================================
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metrics_path: /metrics

  # ============================================
  # RabbitMQ 监控 (通过管理 API)
  # ============================================
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
    metrics_path: /metrics

  # ============================================
  # Nginx 监控
  # ============================================
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:9113']
    metrics_path: /metrics

  # ============================================
  # 黑盒探测 - HTTP 健康检查
  # ============================================
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://app:8000/health
        - http://nginx:80
        - http://grafana:3000/api/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # ============================================
  # 黑盒探测 - TCP 端口检查
  # ============================================
  - job_name: 'blackbox-tcp'
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
        - mysql:3306
        - redis:6379
        - rabbitmq:5672
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
